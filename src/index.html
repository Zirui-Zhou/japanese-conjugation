<!doctype html>
<html lang="zh">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>日语动词变形练习</title>
        <meta name="description" content="学习日语动词和形容词的变形！包含多种形式：过去形、て形、被动形、使役形、可能形等。">
        <meta property="og:title" content="日语动词变形练习">
        <meta property="og:description" content="学习日语动词和形容词的变形！">
        <meta property="og:type" content="website" />
        <meta property="og:image" content="./streamlined_screenshot.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&family=Open+Sans&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="./favicon.ico">
        <link rel="apple-touch-icon" href="./apple-touch-icon.png">
        <link rel="manifest" href="./site.webmanifest">
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
        <script type="module" defer src="main.js"></script>
    </head>
    <body>
    <div id="toppest-container" class="display-none">
        <h1>日语动词变形练习</h1>
        <div id="top-container">
            <div id = "main-view">
                <div id="streak-container">
                        <div id="current-streak" class="streak">
                            <p>当前连对</p>
                            <p id="current-streak-text">0</p>
                        </div>
                        <div id="max-streak" class="streak">
                            <p>最大连对</p>
                            <p id="max-streak-text"> </p>
                        </div>
                    </div>
                    <div id="verb-container">
                        <div id="verb-box">
                            <p id="verb-text" lang="ja"></p>
                            <div id="verb-meta-row">
                                <span id="jlpt-badge"></span>
                                <p id="translation"></p>
                            </div>
                            <p id="verb-type"></p>
                        </div>
                    </div>
                    <div id="conjugation-inquery-container">
                        <p id="conjugation-inquery-text"></p>
                    </div>
                    <div id="status-container">
                        <div id="status-box" class="display-none">
                            <p id="status-text">正确</p>
                        </div>
                    </div>
                    <div id="per-question-tutorial" class="display-none">
                    </div>
                    <div id="input-container">
                        <div id="input-tooltip" class="tooltip">输入无效。仅可使用日语假名和汉字。</div>
                        <input id="main-text-input" type="text" maxlength="30" aria-label="Answer">
                    </div>
                    <div id="settings-container">
                        <div id="settings-child-container">
                            <table id="settings-table">
                                <tr>
                                    <td style="width:17%"><button id="tutorial-button">教程 📖</button></td>
                                    <td style="width:17%"><button id="stats-button">统计 📊</button></td>
                                    <td style="width:36%" id="press-any-key-text" class="display-none">按 Enter/Return 继续</td>
                                    <td style="width:17%"><button id="options-button">设置 ⚙️</button></td>
                                </tr>
                            </table>
                        </div>
                    </div>
            </div>
            <div id="options-view" class="display-none">
                <h2>设置</h2>
                <form id="options-form">
                    <div id="non-conjugation-settings">
                        <div class="option-row">
                            <div class="sub-option-row"><input id="furigana-checkbox" type="checkbox" name="furigana"><label for="furigana-checkbox">在汉字上方显示振假名</label></div>
                            <div id="furigana-sub-options" class="option-row options-indent sub-options">
                                <div class="sub-option-row"><input id="furigana-always-radio" type="radio" name="furiganaTiming" value="always"><label for="furigana-always-radio">始终显示</label></div>
                                <div class="sub-option-row"><input id="furigana-after-radio" type="radio" name="furiganaTiming" value="after"><label for="furigana-after-radio">仅在作答后显示</label></div>
                            </div>
                        </div>
                        <div class="option-row">
                            <div class="sub-option-row"><input id="translation-checkbox" type="checkbox" name="translation"><label for="translation-checkbox">显示中文翻译</label></div>
                            <div id="translation-sub-options" class="option-row options-indent sub-options">
                                <div class="sub-option-row"><input id="translation-always-radio" type="radio" name="translationTiming" value="always"><label for="translation-always-radio">始终显示</label></div>
                                <div class="sub-option-row"><input id="translation-after-radio" type="radio" name="translationTiming" value="after"><label for="translation-after-radio">仅在作答后显示</label></div>
                            </div>
                        </div>
                        <div class="option-row"><input id="emoji-checkbox" type="checkbox" name="emoji"><label for="emoji-checkbox">显示变位类型的表情符号</label></div>
                        <div class="option-row"><input id="streak-checkbox" type="checkbox" name="streak"><label for="streak-checkbox">显示当前/最大连对</label></div>
                    </div>
                    <div id="jlpt-settings">
                        <hr>
                        <div id="jlpt-h3-container">
                            <h3>JLPT 等级</h3>
                        </div>
                        <div class="options-indent" id="jlpt-options-container">
                            <div class="option-row"><input id="jlptn5-checkbox" type="checkbox" name="jlptn5"><label for="jlptn5-checkbox">N5</label></div>
                            <div class="option-row"><input id="jlptn4-checkbox" type="checkbox" name="jlptn4"><label for="jlptn4-checkbox">N4</label></div>
                            <div class="option-row"><input id="jlptn3-checkbox" type="checkbox" name="jlptn3"><label for="jlptn3-checkbox">N3</label></div>
                            <div class="option-row"><input id="jlptn2-checkbox" type="checkbox" name="jlptn2"><label for="jlptn2-checkbox">N2</label></div>
                            <div class="option-row"><input id="jlptn1-checkbox" type="checkbox" name="jlptn1"><label for="jlptn1-checkbox">N1</label></div>
                        </div>
                    </div>
                    <div id="conjugation-settings">
                        <hr>
                        <div id="verbs-h3-container">
                            <input id="verbs-checkbox" type="checkbox" name="verb"><label for="verbs-checkbox"><h3>动词</h3></label>
                            <span id="top-must-choose" class="settings-error-text display-none">*此类别至少需选择 1 项</span>
                        </div>
                        <div class="options-indent" id="verb-options-container">
                            <table style="width:100%" class="options-group">
                                <tr>
                                    <td><input id="verbu-checkbox" type="checkbox" name="verbu"><label for="verbu-checkbox">う动词</label></td>
                                    <td rowspan="3"class="settings-error-text display-none">*此类别至少需选择 1 项</td>
                                </tr>
                                <tr><td><input id="verbru-checkbox" type="checkbox" name="verbru"><label for="verbru-checkbox">る动词</label></td></tr>
                                <tr><td><input id="verbirregular-checkbox" type="checkbox" name="verbirregular"><label for="verbirregular-checkbox">不规则动词</label></td></tr>
                            </table>
                            <hr>
                            <div id="verb-conjugation-type-group" class="options-group">
                            <table style="width:100%" >
                                <tr>
                                    <td><input id="verbpresent-checkbox" type="checkbox" name="verbpresent" class="verb-has-variations"><label for="verbpresent-checkbox">现在时</label></td>
                                    <td rowspan="3"class="settings-error-text display-none">*此类别至少需选择 1 项</td>
                                </tr>
                                <tr><td><input id="verbpast-checkbox" type="checkbox" name="verbpast" class="verb-has-variations"><label for="verbpast-checkbox">过去时</label></td></tr>
                                <tr><td><input id="verbte-checkbox" type="checkbox" name="verbte"><label for="verbte-checkbox">て形</label></td></tr>
                                <tr><td><input id="verbvolitional-checkbox" type="checkbox" name="verbvolitional" class="verb-has-politeness"><label for="verbvolitional-checkbox">意志形 (~よう)</label></td></tr>
                            </table>
                            <div class="advanced-section">
                                <div id="advanced-text">高级</div>
                                <div class="advanced-option"><input id="verbpassive-checkbox" type="checkbox" name="verbpassive" class="verb-has-variations"><label for="verbpassive-checkbox">被动形 (~られる)</label></div>
                                <div class="advanced-option"><input id="verbcausative-checkbox" type="checkbox" name="verbcausative" class="verb-has-variations"><label for="verbcausative-checkbox">使役形 (~させる)</label></div>
                                <div class="advanced-option"><input id="verbcausativepassive-checkbox" type="checkbox" name="verbcausativepassive" class="verb-has-variations"><label for="verbcausativepassive-checkbox">使役被动形 (~させられる)</label></div>
                                <div class="advanced-option"><input id="verbpotential-checkbox" type="checkbox" name="verbpotential" class="verb-has-variations"><label for="verbpotential-checkbox">可能形 (~られる/れる)</label></div>
                                <div class="advanced-option"><input id="verbimperative-checkbox" type="checkbox" name="verbimperative"><label for="verbimperative-checkbox">命令形 (~ろ)</label></div>
                            </div>
                            </div>
                            <div id="verb-variations-container">
                                <div class="options-group">
                                    <hr>
                                    <table style="width:100%">
                                        <tr>
                                            <td><input id="verbaffirmative-checkbox" type="checkbox" name="verbaffirmative"><label for="verbaffirmative-checkbox">肯定</label></td>
                                            <td rowspan="2"class="settings-error-text display-none">*此类别至少需选择 1 项</td>
                                        </tr>
                                        <tr><td><input id="verbnegative-checkbox" type="checkbox" name="verbnegative"><label for="verbnegative-checkbox">否定</label></td></tr>
                                    </table>
                                </div>
                                <div id="verb-politeness-container" class="options-group">
                                    <hr>
                                    <table style="width:100%">
                                        <tr>
                                            <td><input id="verbplain-checkbox" type="checkbox" name="verbplain"><label for="verbplain-checkbox">简体</label></td>
                                            <td rowspan="2"class="settings-error-text display-none">*此类别至少需选择 1 项</td>
                                        </tr>
                                        <tr><td><input id="verbpolite-checkbox" type="checkbox" name="verbpolite"><label for="verbpolite-checkbox">敬体</label></td></tr>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div id="adjectives-h3-container">
                            <input id="adjectives-checkbox" type="checkbox" name="adjective"><label for="adjectives-checkbox"><h3>形容词</h3></label>
                        </div>
                        <div class="options-indent" id="adjective-options-container">
                            <table style="width:100%" class="options-group" id="adjective-type-group">
                                <tr>
                                    <td><input id="adjectivei-checkbox" type="checkbox" name="adjectivei"><label for="adjectivei-checkbox">い形容词</label></td>
                                    <td rowspan="3"class="settings-error-text display-none">*此类别至少需选择 1 项</td>
                                </tr>
                                <tr><td><input id="adjectivena-checkbox" type="checkbox" name="adjectivena"><label for="adjectivena-checkbox">な形容词</label></td></tr>
                                <tr><td><input id="adjectiveirregular-checkbox" type="checkbox" name="adjectiveirregular"><label for="adjectiveirregular-checkbox">不规则形容词</label></td></tr>
                            </table>
                            <hr>
                            <table style="width:100%" class="options-group" id="adjective-conjugation-type-group">
                                <tr>
                                    <td><input id="adjectivepresent-checkbox" type="checkbox" name="adjectivepresent" class="adjective-has-variations"><label for="adjectivepresent-checkbox">现在时</label></td>
                                    <td rowspan="3"class="settings-error-text display-none">*此类别至少需选择 1 项</td>
                                </tr>
                                <tr><td><input id="adjectivepast-checkbox" type="checkbox" name="adjectivepast" class="adjective-has-variations"><label for="adjectivepast-checkbox">过去时</label></td></tr>
                                <tr><td><input id="adjectiveadverb-checkbox" type="checkbox" name="adjectiveadverb"><label for="adjectiveadverb-checkbox">副词形</td></tr>
                            </table>
                            <div id="adjective-variations-container">
                                <div class="options-group">
                                <hr>
                                <table style="width:100%">
                                    <tr>
                                        <td><input id="adjectiveaffirmative-checkbox" type="checkbox" name="adjectiveaffirmative"><label for="adjectiveaffirmative-checkbox">肯定</label></td>
                                        <td rowspan="2"class="settings-error-text display-none">*此类别至少需选择 1 项</td>
                                    </tr>
                                    <tr><td><input id="adjectivenegative-checkbox" type="checkbox" name="adjectivenegative"><label for="adjectivenegative-checkbox">否定</label></td></tr>
                                </table>
                                </div>
                                <div class="options-group">
                                <hr>
                                <table style="width:100%">
                                    <tr>
                                        <td><input id="adjectiveplain-checkbox" type="checkbox" name="adjectiveplain"><label for="adjectiveplain-checkbox">简体</label></td>
                                        <td rowspan="2"class="settings-error-text display-none">*此类别至少需选择 1 项</td>
                                    </tr>
                                    <tr><td><input id="adjectivepolite-checkbox" type="checkbox" name="adjectivepolite"><label for="adjectivepolite-checkbox">敬体</label></td></tr>
                                </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="back-button-container">
                        <button type="submit" id="back-button">返回 ↩</button>
                    </div>    
                </form>
            </div>
            <div id="tutorial-view" class="display-none">
                <div id="tutorial-header">
                    <h2>变形教程</h2>
                    <div id="tutorial-header-buttons">
                        <button type="button" id="tutorial-filter-reset" class="tutorial-header-btn">↺ 重置</button>
                        <button type="button" id="tutorial-back-button-top" class="tutorial-header-btn">返回 ↩</button>
                    </div>
                </div>
                <div id="tutorial-filters" class="display-none">
                    <div id="tutorial-filters-toggle">
                        <span id="tutorial-filters-summary"></span>
                        <button type="button" id="tutorial-filters-toggle-btn">收起 ▲</button>
                    </div>
                    <div id="tutorial-filters-body">
                    <div class="tutorial-filter-row" data-filter-group="wordType">
                        <span class="tutorial-filter-label">词类</span>
                        <div class="tutorial-filter-tags">
                            <button class="tutorial-filter-tag active" data-value="">全部</button>
                            <button class="tutorial-filter-tag" data-value="u">五段动词</button>
                            <button class="tutorial-filter-tag" data-value="ru">一段动词</button>
                            <button class="tutorial-filter-tag" data-value="irv">不规则动词</button>
                            <button class="tutorial-filter-tag" data-value="i">い形</button>
                            <button class="tutorial-filter-tag" data-value="na">な形</button>
                            <button class="tutorial-filter-tag" data-value="ira">不规则形容词</button>
                        </div>
                    </div>
                    <div class="tutorial-filter-row" data-filter-group="conjugationType">
                        <span class="tutorial-filter-label">变位</span>
                        <div class="tutorial-filter-tags">
                            <button class="tutorial-filter-tag active" data-value="">全部</button>
                            <button class="tutorial-filter-tag" data-value="present">现在时</button>
                            <button class="tutorial-filter-tag" data-value="past">过去时</button>
                            <button class="tutorial-filter-tag" data-value="te">て形</button>
                            <button class="tutorial-filter-tag" data-value="volitional">意志形</button>
                            <button class="tutorial-filter-tag" data-value="passive">被动形</button>
                            <button class="tutorial-filter-tag" data-value="causative">使役形</button>
                            <button class="tutorial-filter-tag" data-value="causativePassive">使役被动</button>
                            <button class="tutorial-filter-tag" data-value="potential">可能形</button>
                            <button class="tutorial-filter-tag" data-value="imperative">命令形</button>
                            <button class="tutorial-filter-tag" data-value="adverb">副词形</button>
                        </div>
                    </div>
                    <div class="tutorial-filter-row" data-filter-group="affirmative">
                        <span class="tutorial-filter-label">极性</span>
                        <div class="tutorial-filter-tags">
                            <button class="tutorial-filter-tag active" data-value="">全部</button>
                            <button class="tutorial-filter-tag" data-value="true">肯定</button>
                            <button class="tutorial-filter-tag" data-value="false">否定</button>
                        </div>
                    </div>
                    <div class="tutorial-filter-row" data-filter-group="polite">
                        <span class="tutorial-filter-label">语体</span>
                        <div class="tutorial-filter-tags">
                            <button class="tutorial-filter-tag active" data-value="">全部</button>
                            <button class="tutorial-filter-tag" data-value="false">简体</button>
                            <button class="tutorial-filter-tag" data-value="true">敬体</button>
                        </div>
                    </div>
                    </div>
                </div>
                <div id="tutorial-content">
                </div>
            </div>
            <div id="stats-view" class="display-none">
                <div id="stats-header">
                    <h2>学习统计</h2>
                    <div id="stats-header-buttons">
                        <button type="button" id="stats-clear-button" class="tutorial-header-btn">清除数据</button>
                        <button type="button" id="stats-back-button" class="tutorial-header-btn">返回 ↩</button>
                    </div>
                </div>
                <div id="stats-content">
                </div>
            </div>
        </div>
        <div id="donation-section" class="display-none">
            <p class="footer-text">本应用的<a href="https://github.com/baileysnyder/japanese-conjugation" target="_blank">源代码</a>遵循 GPL-3.0 许可证开放使用。</p>
            <p class="footer-text">如果您觉得本应用有用并希望支持它，请考虑捐赠！</p>
            <form action="https://www.paypal.com/donate" method="post" target="_top">
                <input type="hidden" name="hosted_button_id" value="D3QUUDNRVJYLL" />
                <input type="image" src="https://www.paypalobjects.com/en_US/i/btn/btn_donate_SM.gif" border="0" name="submit" title="PayPal - The safer, easier way to pay online!" alt="通过 PayPal 捐赠" />
            </form>
        </div>
    </div>
    </body>
</html>
